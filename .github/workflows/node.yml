name: Node CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Show Current Folder
        run: pwd

      - name: Show All Files
        run: ls -R

      - name: Find agent.js
        run: find . -name agent.js